name: Conformance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  schema-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate schema fixtures
        run: python conformance/validate_schema.py
